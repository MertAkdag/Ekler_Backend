name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ekler/contracts build
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test

  # Drizzle drift — schema introspection must round-trip cleanly. Requires a DB,
  # so it runs only when DIRECT_DATABASE_URL is configured as a repo secret.
  db-drift:
    runs-on: ubuntu-latest
    if: ${{ false }} # enable once DIRECT_DATABASE_URL secret is set
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:pull
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      - name: Fail on schema drift
        run: git diff --exit-code apps/api/src/db/schema
